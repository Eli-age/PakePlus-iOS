                    if (!name) { alert('请输入新项目名称'); return; }
                    targetProj = { id: genId(), name: name, code: code || '', createdAt: Date.now(), records: {}, conditions: {}, projectInfo: {} };
                    appData.projects.push(targetProj);
                } else {
                    targetProj = appData.projects.find(p => p.id === targetId);
                    if (!targetProj) { alert('目标项目不存在'); return; }
                }
                const mergeMode = document.getElementById('importMergeMode').value;
                const importedRecords = importData.records || {};
                const importedConditions = importData.conditions || {};
                const importedProjectInfo = importData.projectInfo || {};

                if (!targetProj.records) targetProj.records = {};
                if (!targetProj.conditions) targetProj.conditions = {};
                if (!targetProj.projectInfo) targetProj.projectInfo = {};

                for (const date in importedRecords) {
                    if (!targetProj.records[date]) targetProj.records[date] = [];
                    if (mergeMode === 'append') {
                        for (const card of importedRecords[date]) {
                            targetProj.records[date].push({ ...card, id: genCardId() });
                        }
                    } else if (mergeMode === 'replace') {
                        targetProj.records[date] = importedRecords[date].map(c => ({ ...c, id: genCardId() }));
                    }
                    if (importedConditions[date]) {
                        targetProj.conditions[date] = { ...targetProj.conditions[date], ...importedConditions[date] };
                    }
                    if (importedProjectInfo[date]) {
                        targetProj.projectInfo[date] = { ...targetProj.projectInfo[date], ...importedProjectInfo[date] };
                    }
                }
                saveData();
                closeModal();
                if (currentProjectId === targetProj.id) {
                    renderRecordView();
                } else {
                    renderProjectList();
                }
                alert(`成功导入 ${Object.keys(importedRecords).length} 天的数据到项目 "${targetProj.name}"`);
            });
        });

        // ======================================================================
        //  搜索功能
        // ======================================================================
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.trim();
            document.getElementById('searchClearBtn').style.display = val ? 'inline-block' : 'none';
            renderProjectList();
        });
        document.getElementById('searchClearBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClearBtn').style.display = 'none';
            renderProjectList();
        });

        // ======================================================================
        //  新建项目
        // ======================================================================
        document.getElementById('newProjectBtn').addEventListener('click', () => {
            const bodyHtml = `
                <label>项目名称</label>
                <input type="text" id="newProjectName" placeholder="输入项目名称" />
                <label>项目代号 (可选)</label>
                <input type="text" id="newProjectCode" placeholder="如: RXN-2026" />
            `;
            const footerHtml = `
                <div class="btn-group">
                    <button class="btn btn-secondary" id="newProjectCancel">取消</button>
                    <button class="btn btn-primary" id="newProjectConfirm">创建</button>
                </div>
            `;
            openModal(bodyHtml, footerHtml, '📁 新建项目');
            document.getElementById('newProjectCancel').addEventListener('click', closeModal);
            document.getElementById('newProjectConfirm').addEventListener('click', () => {
                const name = document.getElementById('newProjectName').value.trim();
                const code = document.getElementById('newProjectCode').value.trim();
                if (!name) { alert('请输入项目名称'); return; }
                const newProj = { id: genId(), name: name, code: code || '', createdAt: Date.now(), records: {}, conditions: {}, projectInfo: {} };
                appData.projects.push(newProj);
                saveData();
                closeModal();
                renderProjectList();
            });
        });

        // ======================================================================
        //  导出选定日期 (第三分区)
        // ======================================================================
        document.getElementById('exportSelectedBtn').addEventListener('click', () => {
            if (!currentProjectId) return;
            const proj = getCurrentProject();
            if (!proj) return;
            const records = proj.records || {};
            const dates = Object.keys(records).filter(d => records[d].length > 0);
            if (dates.length === 0) {
                alert('该项目还没有任何记录可导出');
                return;
            }
            let listHtml = dates.map(d => {
                const count = records[d].length;
                return `
                    <div class="date-item">
                        <input type="checkbox" value="${d}" id="date_${d}" checked />
                        <label for="date_${d}">${d}</label>
                        <span class="record-count">${count} 条记录</span>
                    </div>
                `;
            }).join('');
            const bodyHtml = `
                <label>选择要导出的日期（可多选）</label>
                <div class="date-checkbox-list">${listHtml}</div>
                <div style="margin-top:8px;display:flex;gap:8px;">
                    <button id="selectAllDates" class="btn btn-secondary" style="flex:0;">全选</button>
                    <button id="deselectAllDates" class="btn btn-secondary" style="flex:0;">取消全选</button>
                </div>
            `;
            const footerHtml = `
                <div class="btn-group">
                    <button class="btn btn-secondary" id="exportDateCancel">取消</button>
                    <button class="btn btn-primary" id="exportDateConfirm">导出选定</button>
                </div>
            `;
            openModal(bodyHtml, footerHtml, '📤 导出选定日期');
            document.getElementById('exportDateCancel').addEventListener('click', closeModal);
            document.getElementById('selectAllDates').addEventListener('click', () => {
                document.querySelectorAll('#modalSheet .date-item input[type="checkbox"]').forEach(cb => cb.checked = true);
            });
            document.getElementById('deselectAllDates').addEventListener('click', () => {
                document.querySelectorAll('#modalSheet .date-item input[type="checkbox"]').forEach(cb => cb.checked = false);
            });
            document.getElementById('exportDateConfirm').addEventListener('click', () => {
                const selected = [];
                document.querySelectorAll('#modalSheet .date-item input[type="checkbox"]:checked').forEach(cb => {
                    selected.push(cb.value);
                });
                if (selected.length === 0) {
                    alert('请至少选择一个日期');
                    return;
                }
                const exportData = {
                    project: { name: proj.name, code: proj.code || '', id: proj.id },
                    records: {},
                    conditions: {},
                    projectInfo: {}
                };
                for (const date of selected) {
                    if (proj.records[date]) exportData.records[date] = proj.records[date];
                    if (proj.conditions && proj.conditions[date]) exportData.conditions[date] = proj.conditions[date];
                    if (proj.projectInfo && proj.projectInfo[date]) exportData.projectInfo[date] = proj.projectInfo[date];
                }
                const dataStr = JSON.stringify(exportData, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${proj.name}_导出_${selected.join('_')}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                closeModal();
            });
        });

        // ======================================================================
        //  初始化
        // ======================================================================
        if (appData.projects.length === 0) {
            const defaultProj = { id: genId(), name: '默认项目', code: 'DEFAULT', createdAt: Date.now(), records: {}, conditions: {}, projectInfo: {} };
            appData.projects.push(defaultProj);
            saveData();
        }
        showProjectListView();
        console.log('🧪 实验记录已启动 (v19) — 模态框头部/底部固定，可滑动，按钮样式统一');
    </script>
</body>
</html>
